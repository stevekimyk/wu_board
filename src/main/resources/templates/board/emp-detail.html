<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|사원 정보 - ${emp != null ? emp.empnoNm : empno}|">사원 정보</title>
    <th:block th:replace="~{fragments/layout :: css}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('free')}"></nav>

<div class="page-header">
    <div class="container">
        <h2><i class="bi bi-person-badge me-2"></i>사원 정보 조회</h2>
        <p>사원번호로 조회한 상세 정보입니다.</p>
    </div>
</div>

<div class="container my-5">

    <!-- 조회 결과 없음 -->
    <div th:if="${emp == null}" class="text-center py-5">
        <i class="bi bi-person-x" style="font-size:4rem; color:#adb5bd;"></i>
        <h4 class="mt-3 text-muted">사원을 찾을 수 없습니다</h4>
        <p class="text-muted">사원번호 <strong th:text="${empno}"></strong> 에 해당하는 정보가 없습니다.</p>
        <a href="/board/list?type=free" class="btn btn-dark mt-2">
            <i class="bi bi-arrow-left me-1"></i>목록으로
        </a>
    </div>

    <!-- 조회 결과 있음 -->
    <div th:if="${emp != null}" class="row justify-content-center">
        <div class="col-md-6">
            <div class="card board-card">
                <div class="card-header bg-dark text-white py-3">
                    <i class="bi bi-person-circle me-2"></i>사원 상세 정보
                </div>
                <div class="card-body p-4">

                    <!-- 사진 -->
                    <div class="text-center mb-4">
                        <img th:if="${emp.photo != null}"
                             th:src="@{/board/photo/{empno}(empno=${emp.empno})}"
                             alt="사원사진"
                             style="width:200px; height:240px; object-fit:cover; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15);">
                        <div th:unless="${emp.photo != null}"
                             class="d-flex align-items-center justify-content-center bg-light rounded"
                             style="width:200px; height:240px; margin:0 auto; border:2px dashed #dee2e6;">
                            <i class="bi bi-person" style="font-size:5rem; color:#adb5bd;"></i>
                        </div>
                    </div>

                    <!-- 정보 테이블 -->
                    <table class="table table-bordered align-middle mb-0">
                        <tbody>
                            <tr>
                                <th class="text-center bg-light" style="width:35%;">사원번호</th>
                                <td th:text="${emp.empno}"></td>
                            </tr>
                            <tr>
                                <th class="text-center bg-light">사원명</th>
                                <td th:text="${emp.empnoNm}"></td>
                            </tr>
                            <tr>
                                <th class="text-center bg-light">부서코드</th>
                                <td th:text="${emp.deptNo}"></td>
                            </tr>
                            <tr>
                                <th class="text-center bg-light">부서명</th>
                                <td th:text="${emp.deptNoNm}"></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
                <div class="card-footer text-end bg-white border-0 pb-3 pe-3">
                    <a href="/board/list?type=free" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>목록으로
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: js}"></th:block>

</body>
</html>
