<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 커뮤니티 게시판</title>
    <th:block th:replace="~{fragments/layout :: css}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar(${type})}"></nav>

<div class="page-header">
    <div class="container">
        <h2><i class="bi bi-pencil-square me-2"></i>글쓰기</h2>
        <p><span th:text="${typeLabel}">자유게시판</span>에 새 글을 작성합니다.</p>
    </div>
</div>

<div class="container my-4">
    <div class="card board-card">
        <div class="card-body">
            <form th:action="@{/board/write}" method="post">
                <input type="hidden" name="boardType" th:value="${type}">

                <!-- 게시판 선택 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">게시판</label>
                    <select class="form-select" name="boardType">
                        <option value="notice"  th:selected="${type=='notice'}">공지사항</option>
                        <option value="free"    th:selected="${type=='free'}">자유게시판</option>
                        <option value="qna"     th:selected="${type=='qna'}">질문/답변</option>
                        <option value="gallery" th:selected="${type=='gallery'}">갤러리</option>
                    </select>
                </div>

                <!-- 제목 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">제목 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="title"
                           placeholder="제목을 입력하세요" required maxlength="100">
                </div>

                <!-- 작성자 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">작성자 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="writer"
                           placeholder="작성자명" required maxlength="20" style="max-width: 240px;">
                </div>

                <!-- 내용 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">내용 <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="content" rows="14"
                              placeholder="내용을 입력하세요" required></textarea>
                </div>

                <!-- 첨부파일 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">첨부파일</label>
                    <input type="file" class="form-control" name="attach" multiple>
                    <div class="form-text">최대 5개, 파일당 10MB 이하</div>
                </div>

                <!-- 버튼 -->
                <div class="d-flex justify-content-between">
                    <a th:href="@{/board/list(type=${type})}" class="btn btn-secondary">
                        <i class="bi bi-x-lg me-1"></i>취소
                    </a>
                    <div>
                        <button type="reset" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>다시쓰기
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>등록
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: js}"></th:block>

</body>
</html>
