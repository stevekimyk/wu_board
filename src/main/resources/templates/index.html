<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진하가족 커뮤니티 게시판 - 홈</title>
    <th:block th:replace="~{fragments/layout :: css}"></th:block>
    <style>
        .hero {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 60px 0 50px;
            text-align: center;
        }
        .hero h1 { font-size: 2.2rem; font-weight: 700; }
        .hero p  { font-size: 1.05rem; opacity: 0.85; }

        .board-card { transition: transform .2s, box-shadow .2s; cursor: pointer; }
        .board-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,.14);
        }
        .board-card .list-group-item { font-size: .9rem; padding: .55rem 1rem; }
        .board-card .list-group-item:hover { background-color: #f1f5f9; }

    </style>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar('home')}"></nav>

<!-- 히어로 -->
<div class="hero">
    <div class="container">
        <h1><i class="bi bi-people-fill me-2"></i>교직원 사내 연락처 공유하기</h1>
        <p class="mt-2 mb-4">공지사항, 교직원 연락처 게시판, 질문/답변 등 다양한 게시판을 이용해보세요.</p>
        <a href="/board/write?type=free" class="btn btn-light btn-lg me-2">
            <i class="bi bi-pencil-square me-1"></i>글쓰기
        </a>
    </div>
</div>

<div class="container my-5">
    <div class="row g-4">
        <div class="col-12">

            <!-- 공지사항 -->
            <div class="card board-card mb-4">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-megaphone-fill me-2"></i>공지사항</span>
                    <a href="/board/list?type=notice" class="btn btn-sm btn-outline-light">더보기</a>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between">
                        <a href="/board/detail/1" class="text-decoration-none text-dark">서비스 점검 안내 (5/10 02:00~04:00)</a>
                        <small class="text-muted">2026-05-07</small>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <a href="/board/detail/2" class="text-decoration-none text-dark">개인정보처리방침 개정 안내</a>
                        <small class="text-muted">2026-05-01</small>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <a href="/board/detail/3" class="text-decoration-none text-dark">5월 이벤트 안내</a>
                        <small class="text-muted">2026-04-28</small>
                    </li>
                </ul>
            </div>

            <!-- 교직원 연락처 게시판 -->
            <div class="card board-card mb-4">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-chat-dots-fill me-2"></i>교직원 연락처 게시판</span>
                    <a href="/board/list?type=free" class="btn btn-sm btn-outline-light">더보기</a>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a href="/board/detail/101" class="text-decoration-none text-dark">
                            오늘 점심 뭐 먹었나요?
                            <span class="badge bg-danger badge-new ms-1">NEW</span>
                        </a>
                        <small class="text-muted">홍길동 · 댓글 12</small>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a href="/board/detail/100" class="text-decoration-none text-dark">주말에 갈만한 카페 추천해주세요</a>
                        <small class="text-muted">이순신 · 댓글 8</small>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a href="/board/detail/99" class="text-decoration-none text-dark">Spring Boot 공부 팁 공유합니다</a>
                        <small class="text-muted">김철수 · 댓글 5</small>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: js}"></th:block>

</body>
</html>
