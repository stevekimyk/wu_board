<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:fragment="head(title)" th:text="${title}">진하가족 커뮤니티 게시판</title>

    <!-- 공통 CSS: fragment="css" 로 끌어쓴다 -->
    <th:block th:fragment="css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body { background-color: #f8f9fa; }

            /* 네비게이션 */
            .navbar { background-color: #2c3e50; }
            .navbar-brand { font-size: 1.4rem; font-weight: 700; color: #fff !important; }
            .nav-link { color: #cfd8dc !important; font-weight: 500; transition: color .2s; }
            .nav-link:hover, .nav-link.active { color: #fff !important; }

            /* 페이지 헤더 */
            .page-header {
                background: linear-gradient(135deg, #2c3e50, #3498db);
                color: #fff;
                padding: 40px 0 30px;
            }
            .page-header h2 { font-weight: 700; margin: 0; }
            .page-header p  { opacity: .85; margin: 6px 0 0; }

            /* 카드 공통 */
            .board-card {
                border: none;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,.08);
            }
            .board-card .card-header {
                border-radius: 12px 12px 0 0 !important;
                font-weight: 600;
            }

            /* 테이블 */
            .table-board thead { background-color: #2c3e50; color: #fff; }
            .table-board tbody tr { cursor: pointer; }
            .table-board tbody tr:hover { background-color: #f1f5f9; }
            .badge-new { font-size: .7rem; vertical-align: middle; }

            /* 페이지네이션 */
            .pagination .page-link { color: #2c3e50; }
            .pagination .page-item.active .page-link {
                background-color: #2c3e50; border-color: #2c3e50;
            }
        </style>
    </th:block>
</head>
<body>

<!-- ══════════════════════════════
     상단 네비게이션 (공통)
══════════════════════════════ -->
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-layout-text-window-reverse me-2"></i>구)원광보건대 교직원 커뮤니티
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active}=='home' ? 'active'" href="/">
                        <i class="bi bi-house me-1"></i>홈
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active}=='notice' ? 'active'" href="/board/list?type=notice">
                        <i class="bi bi-megaphone me-1"></i>공지사항
                    </a>
                </li>
<li class="nav-item">
                    <a class="nav-link" th:classappend="${active}=='qna' ? 'active'" href="/board/list?type=qna">
                        <i class="bi bi-question-circle me-1"></i>질문/답변
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active}=='gallery' ? 'active'" href="/board/list?type=gallery">
                        <i class="bi bi-images me-1"></i>갤러리
                    </a>
                </li>
            </ul>
            <form class="d-flex me-3" role="search" action="/board/list" method="get">
                <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="검색어 입력...">
                <button class="btn btn-outline-light btn-sm" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>
            <div class="d-flex gap-2">
                <a href="/login"  class="btn btn-outline-light btn-sm">로그인</a>
                <a href="/signup" class="btn btn-primary btn-sm">회원가입</a>
            </div>
        </div>
    </div>
</nav>

<!-- ══════════════════════════════
     푸터 (공통)
══════════════════════════════ -->
<footer th:fragment="footer" class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
        <p class="mb-1">© 2026 커뮤니티 게시판. All rights reserved.</p>
        <small class="text-muted">
            <a href="/terms"   class="text-muted me-3">이용약관</a>
            <a href="/privacy" class="text-muted me-3">개인정보처리방침</a>
            <a href="/contact" class="text-muted">문의하기</a>
        </small>
    </div>
</footer>

<!-- 공통 JS -->
<th:block th:fragment="js">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
