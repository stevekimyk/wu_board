<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body { background-color: #f8f9fa; }

            .navbar { background-color: #2c3e50; }
            .navbar-brand { font-size: 1.4rem; font-weight: 700; color: #fff !important; }
            .nav-link { color: #cfd8dc !important; font-weight: 500; transition: color .2s; }
            .nav-link:hover, .nav-link.active { color: #fff !important; }

            .page-header {
                background: linear-gradient(135deg, #2c3e50, #3498db);
                color: #fff;
                padding: 40px 0 30px;
            }
            .page-header h2 { font-weight: 700; margin: 0; }
            .page-header p  { opacity: .85; margin: 6px 0 0; }

            .board-card {
                border: none;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,.08);
            }
            .board-card .card-header {
                border-radius: 12px 12px 0 0 !important;
                font-weight: 600;
            }

            .table-board thead { color: #fff; }
            .table-board tbody tr { cursor: pointer; }
            .table-board tbody tr:hover { background-color: #f1f5f9; }
            .badge-new { font-size: .7rem; vertical-align: middle; }

            .pagination .page-link { color: #2c3e50; }
            .pagination .page-item.active .page-link {
                background-color: #2c3e50; border-color: #2c3e50;
            }
        </style>
    </th:block>
</head>
</html>
